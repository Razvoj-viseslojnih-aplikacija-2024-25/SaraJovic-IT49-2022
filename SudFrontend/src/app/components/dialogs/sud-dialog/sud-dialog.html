<div class="container">
  <h3 mat-dialog-title *ngIf="flag == 1">Dodavanje suda</h3>
  <h3 mat-dialog-title *ngIf="flag == 2">Ažuriranje suda: {{ data.naziv }}</h3>
  <h3 mat-dialog-title *ngIf="flag == 3">Brisanje suda: {{ data.naziv }}</h3>
  
  <form class="mat-dialog-content" #formControl="ngForm">
    <div class="form">
      <mat-form-field>
        <input
          matInput
          placeholder="Naziv"
          name="naziv"
          [disabled]="flag == 3"
          [(ngModel)]="data.naziv"
          required
        />
      </mat-form-field>
    </div>
    
    <div class="form">
      <mat-form-field>
        <input
          matInput
          placeholder="Adresa"
          name="adresa"
          [disabled]="flag == 3"
          [(ngModel)]="data.adresa"
          required
        />
      </mat-form-field>
    </div>
  </form>
  
  <div class="mat-dialog-actions">
    <button
      matButton
      *ngIf="flag == 1"
      type="submit"
      [disabled]="!formControl.valid"
      (click)="add()"
    >
      Sačuvaj
    </button>
    <button
      matButton
      *ngIf="flag == 2"
      type="submit"
      [disabled]="!formControl.valid"
      (click)="update()"
    >
      Ažuriraj
    </button>
    <button matButton *ngIf="flag == 3" (click)="delete()">Obriši</button>
    <button matButton (click)="cancel()">Otkaži</button>
  </div>
</div>
