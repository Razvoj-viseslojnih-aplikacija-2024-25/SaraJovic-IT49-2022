<div class="container">
  <h3 mat-dialog-title *ngIf="flag == 1">Dodavanje učesnika</h3>
  <h3 mat-dialog-title *ngIf="flag == 2">Ažuriranje učesnika: {{ data.ime }} {{ data.prezime }}</h3>
  <h3 mat-dialog-title *ngIf="flag == 3">Brisanje učesnika: {{ data.ime }} {{ data.prezime }}</h3>

  <form class="mat-dialog-content" #formControl="ngForm">
    <div class="form">
      <mat-form-field>
        <input matInput placeholder="Ime" name="ime" [disabled]="flag == 3" [(ngModel)]="data.ime" required />
      </mat-form-field>
    </div>

    <div class="form">
      <mat-form-field>
        <input matInput placeholder="Prezime" name="prezime" [disabled]="flag == 3" [(ngModel)]="data.prezime"
          required />
      </mat-form-field>
    </div>

    <div class="form">
      <mat-form-field>
        <input matInput placeholder="MBR" name="mbr" [disabled]="flag == 3" [(ngModel)]="data.mbr" required />
      </mat-form-field>
    </div>

    <mat-form-field>
      <mat-select placeholder="Status" name="status" [disabled]="flag == 3" [(ngModel)]="data.status" required>
        <mat-option value="Tuzilac">Tuzilac</mat-option>
        <mat-option value="Okrivljeni">Okrivljeni</mat-option>
        <mat-option value="Svedok">Svedok</mat-option>
      </mat-select>
    </mat-form-field>
  </form>

  <div class="mat-dialog-actions">
    <button matButton *ngIf="flag == 1" type="submit" [disabled]="!formControl.valid" (click)="add()">
      Sačuvaj
    </button>
    <button matButton *ngIf="flag == 2" type="submit" [disabled]="!formControl.valid" (click)="update()">
      Ažuriraj
    </button>
    <button matButton *ngIf="flag == 3" (click)="delete()">Obriši</button>
    <button matButton (click)="cancel()">Otkaži</button>
  </div>
</div>
