<!-- Toolbar -->
<mat-toolbar color="primary" class="toolbar">
  <span class="toolbar-title">📂 Predmeti</span>
  <span class="spacer"></span>

  <button mat-raised-button color="accent" (click)="openDialog(1)">
    <mat-icon>add</mat-icon>
    Novi predmet
  </button>
</mat-toolbar>

<!-- Table container -->
<div class="table-container mat-elevation-z8">
  <table
    mat-table
    matSort
    [dataSource]="dataSource"
    class="full-width-table"
  >
    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>#</th>
      <td mat-cell *matCellDef="let row">{{ row.id }}</td>
    </ng-container>

    <!-- Broj predmeta -->
    <ng-container matColumnDef="brojPredmeta">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>
        Broj predmeta
      </th>
      <td mat-cell *matCellDef="let row">
        <strong>{{ row.brojPredmeta }}</strong>
      </td>
    </ng-container>

    <!-- Opis -->
    <ng-container matColumnDef="opis">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Opis</th>
      <td mat-cell *matCellDef="let row">
        {{ row.opis }}
      </td>
    </ng-container>

    <!-- Datum početka -->
    <ng-container matColumnDef="datumPocetka">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>
        Datum početka
      </th>
      <td mat-cell *matCellDef="let row">
        {{ row.datumPocetka | date:'dd.MM.yyyy' }}
      </td>
    </ng-container>

    <!-- Aktivan -->
    <ng-container matColumnDef="aktivan">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">
        <span class="status-badge" [ngClass]="row.aktivan ? 'active' : 'inactive'">
          <mat-icon class="badge-icon">
            {{ row.aktivan ? 'check_circle' : 'cancel' }}
          </mat-icon>
          {{ row.aktivan ? 'Aktivan' : 'Neaktivan' }}
        </span>
      </td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Akcije</th>
      <td mat-cell *matCellDef="let row" class="center">
        <button
          mat-icon-button
          color="primary"
          (click)="openDialog(2, row.id, row.brojPredmeta, row.opis, row.datumPocetka, row.aktivan)"
          matTooltip="Izmeni"
        >
          <mat-icon>edit</mat-icon>
        </button>

        <button
          mat-icon-button
          color="warn"
          (click)="openDialog(3, row.id, row.brojPredmeta, row.opis, row.datumPocetka, row.aktivan)"
          matTooltip="Obriši"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      class="table-row"
    ></tr>
  </table>

  <!-- Paginator -->
  <mat-paginator
    [pageSizeOptions]="[5, 10, 20]"
    showFirstLastButtons
  ></mat-paginator>
</div>
