
<mat-toolbar color="primary">
  <span class="title-center">Predmeti</span>
</mat-toolbar>

<div class="container mat-elevation-z8">
  <mat-table [dataSource]="dataSource" matSort class="mat-table">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <mat-header-cell *matHeaderCellDef mat-sort-header>ID</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.id }}</mat-cell>
    </ng-container>

    <!-- Broj Predmeta Column -->
    <ng-container matColumnDef="brojPredmeta">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Broj Predmeta</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.brojPredmeta }}</mat-cell>
    </ng-container>

    <!-- Opis Column -->
    <ng-container matColumnDef="opis">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Opis</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.opis }}</mat-cell>
    </ng-container>

    <!-- Datum Pocetka Column -->
    <ng-container matColumnDef="datumPocetka">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Datum Početka</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.datumPocetka | date: 'dd.MM.yyyy' }}</mat-cell>
    </ng-container>

    <!-- Aktivan Column -->
    <ng-container matColumnDef="aktivan">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Status</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <mat-chip [ngClass]="row.aktivan ? 'status-active' : 'status-inactive'">
          <mat-icon class="chip-icon">{{ row.aktivan ? 'check_circle' : 'cancel' }}</mat-icon>
          {{ row.aktivan ? 'Aktivan' : 'Neaktivan' }}
        </mat-chip>
      </mat-cell>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Akcije</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <button mat-icon-button color="primary" 
                (click)="openDialog(2, row.id, row.brojPredmeta, row.opis, row.datumPocetka, row.aktivan)"
                matTooltip="Izmeni">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" 
                (click)="openDialog(3, row.id, row.brojPredmeta, row.opis, row.datumPocetka, row.aktivan)"
                matTooltip="Obriši">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

  </mat-table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>

<!-- Add Button -->
<button mat-fab color="primary" class="add-button" 
        (click)="openDialog(1)"
        matTooltip="Dodaj novi predmet">
  <mat-icon>add</mat-icon>
</button>
