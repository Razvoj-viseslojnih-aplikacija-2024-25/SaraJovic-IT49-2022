<mat-toolbar color="primary">
  <span class="title-center">Ročišta</span>
</mat-toolbar>

<div class="container mat-elevation-z8">
  <mat-table [dataSource]="dataSource" matSort class="mat-table">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <mat-header-cell *matHeaderCellDef mat-sort-header>ID</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.id }}</mat-cell>
    </ng-container>

    <!-- Datum Rocista Column -->
    <ng-container matColumnDef="datumRocista">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Datum Ročišta</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.datumRocista | date: 'dd.MM.yyyy' }}</mat-cell>
    </ng-container>

    <!-- Sudnica Column -->
    <ng-container matColumnDef="sudnica">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Sudnica</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.sudnica }}</mat-cell>
    </ng-container>

   <!-- Predmet Column -->
<ng-container matColumnDef="predmet">
  <mat-header-cell *matHeaderCellDef mat-sort-header>Predmet</mat-header-cell>
  <mat-cell *matCellDef="let row">{{ row.predmet?.brojPredmeta || 'N/A' }}</mat-cell>
</ng-container>

    <!-- Ucesnik Column -->
    <ng-container matColumnDef="ucesnik">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Učesnik</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.ucesnik?.ime }} {{ row.ucesnik?.prezime }}</mat-cell>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Akcije</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <button mat-icon-button color="primary" 
                (click)="openDialog(2, row.id, row.datumRocista, row.sudnica, row.predmet, row.ucesnik)"
                matTooltip="Izmeni">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" 
                (click)="openDialog(3, row.id, row.datumRocista, row.sudnica, row.predmet, row.ucesnik)"
                matTooltip="Obriši">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

  </mat-table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>

<!-- Add Button -->
<button mat-fab color="primary" class="add-button" 
        (click)="openDialog(1)"
        matTooltip="Dodaj novo ročište">
  <mat-icon>add</mat-icon>
</button>
