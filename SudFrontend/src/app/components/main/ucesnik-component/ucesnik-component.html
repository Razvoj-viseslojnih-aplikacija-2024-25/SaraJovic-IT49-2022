<mat-toolbar color="primary">
  <span class="title-center">Učesnici</span>
</mat-toolbar>

<div class="container mat-elevation-z8">
  <mat-table [dataSource]="dataSource" matSort class="mat-table">

    <!-- ID Column -->
    <ng-container matColumnDef="id">
      <mat-header-cell *matHeaderCellDef mat-sort-header>ID</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.id }}</mat-cell>
    </ng-container>

    <!-- Ime Column -->
    <ng-container matColumnDef="ime">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Ime</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.ime }}</mat-cell>
    </ng-container>

    <!-- Prezime Column -->
    <ng-container matColumnDef="prezime">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Prezime</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.prezime }}</mat-cell>
    </ng-container>

    <!-- MBR Column -->
    <ng-container matColumnDef="mbr">
      <mat-header-cell *matHeaderCellDef mat-sort-header>MBR</mat-header-cell>
      <mat-cell *matCellDef="let row">{{ row.mbr }}</mat-cell>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Status</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <mat-chip class="status-chip" [ngClass]="getStatusClass(row.status)">
          <mat-icon class="chip-icon">{{ getStatusIcon(row.status) }}</mat-icon>
          {{ row.status }}
        </mat-chip>
      </mat-cell>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Akcije</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <button mat-icon-button color="primary" 
                (click)="openDialog(2, row.id, row.ime, row.prezime, row.mbr, row.status)"
                matTooltip="Izmeni">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" 
                (click)="openDialog(3, row.id, row.ime, row.prezime, row.mbr, row.status)"
                matTooltip="Obriši">
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

  </mat-table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>

<!-- Add Button -->
<button mat-fab color="primary" class="add-button" 
        (click)="openDialog(1)"
        matTooltip="Dodaj novog učesnika">
  <mat-icon>add</mat-icon>
</button>
