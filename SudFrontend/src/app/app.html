<mat-sidenav-container class="example-container">
  <mat-sidenav mode="side" [fixedInViewport]="true" opened>
    <mat-accordion>
      <!-- Home Button -->
      <a mat-button routerLink="/home" class="home-button">
        <mat-icon>home</mat-icon>
        <h1 style="color:red">ANGULAR RADI</h1>

        <span>Početna</span>
      </a>

      <!-- Aplikacija Panel -->
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>Sudski Sistem</mat-panel-title>
          <mat-panel-description>
            Aplikacija za vođenje evidencije sudova
          </mat-panel-description>
        </mat-expansion-panel-header>

        <mat-nav-list>
          <a mat-raised-button routerLink="/sudovi" class="nav-button sud-button">
            <mat-icon>account_balance</mat-icon>
            Sudovi
          </a>
        </mat-nav-list>

        <mat-nav-list>
          <a mat-raised-button routerLink="/ucesnici" class="nav-button ucesnik-button">
            <mat-icon>people</mat-icon>
            Učesnici
          </a>
        </mat-nav-list>

        <mat-nav-list>
          <a mat-raised-button routerLink="/predmeti" class="nav-button predmet-button">
            <mat-icon>folder</mat-icon>
            Predmeti
          </a>
        </mat-nav-list>

        <mat-nav-list>
          <a mat-raised-button routerLink="/rocista" class="nav-button rociste-button">
            <mat-icon>gavel</mat-icon>
            Ročišta
          </a>
        </mat-nav-list>
      </mat-expansion-panel>

      <!-- Informacije Panel -->
      <mat-expansion-panel>
        <mat-expansion-panel-header>
          <mat-panel-title>Informacije</mat-panel-title>
          <mat-panel-description>
            Osnovne informacije o aplikaciji
          </mat-panel-description>
        </mat-expansion-panel-header>

        <mat-nav-list>
          <a mat-button routerLink="/about" class="info-link">
            <mat-icon>info</mat-icon>
            O nama
          </a>
        </mat-nav-list>

        <mat-nav-list>
          <a mat-button routerLink="/author" class="info-link">
            <mat-icon>person</mat-icon>
            Autor
          </a>
        </mat-nav-list>

        <mat-nav-list>
          <a mat-button routerLink="/home" class="info-link">
            <mat-icon>home</mat-icon>
            Početna
          </a>
        </mat-nav-list>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
